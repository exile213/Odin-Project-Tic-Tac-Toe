<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="tic-tac-toe.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="title-container">
        <h1 class="title">Tic Tac Toe</h1>
        <p class="description">This is a simple Tic Tac Toe game for the odin project applying factory functions, IFFE, Closures and module Pattern</p>
        <div class="playertext-container">
            <div class="player1-label"> Player 1: X</div>
            <div class="player2-label"> Player 2: O</div>
        </div>
        <div id="WinnerText">Player1 is the Winner</div>
        <div class="grid-container">
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
        <footer>
    </div>
        <p>Created by Emil Diaz</p>
        <a href="https://www.flaticon.com/free-icons/tic-tac-toe" title="tic tac toe icons">Tic tac toe icons created by zafdesign - Flaticon</a>
    </footer>
    <script src="script.js"></script>

</html>
